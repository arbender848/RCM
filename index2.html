<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noteable RCM — Partner Onboarding Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0F2744;
    --navy-mid: #1B3A6B;
    --teal: #0A7B7B;
    --teal-light: #0DA8A8;
    --amber: #D97706;
    --red: #B91C1C;
    --green: #15803D;
    --cream: #F9F6F1;
    --warm-gray: #EDE9E3;
    --border: #D6D0C8;
    --text: #1A1410;
    --text-muted: #6B6560;
    --text-light: #9C958E;
    --white: #FFFFFF;
    --shadow: 0 2px 12px rgba(15,39,68,0.08);
    --shadow-lg: 0 8px 32px rgba(15,39,68,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 260px;
    height: 100vh;
    background: var(--navy);
    overflow-y: auto;
    z-index: 100;
    display: flex;
    flex-direction: column;
  }

  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-logo .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--white);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  .sidebar-logo .sub {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .partner-info {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .partner-info label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.35);
    display: block;
    margin-bottom: 6px;
  }
  .partner-info input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .partner-info input::placeholder { color: rgba(255,255,255,0.25); }
  .partner-info input:focus { border-color: var(--teal-light); }

  .nav-section {
    padding: 12px 0;
    flex: 1;
  }
  .nav-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.3);
    padding: 8px 24px 4px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 24px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); }
  .nav-item.active { background: rgba(13,168,168,0.15); }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--teal-light);
    border-radius: 0 2px 2px 0;
  }
  .nav-item .nav-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    border: 1.5px solid rgba(255,255,255,0.15);
    transition: all 0.2s;
  }
  .nav-item.active .nav-icon,
  .nav-item.completed .nav-icon {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
  }
  .nav-item .nav-text {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    line-height: 1.3;
    transition: color 0.15s;
  }
  .nav-item.active .nav-text { color: var(--white); font-weight: 500; }
  .nav-item.completed .nav-text { color: rgba(255,255,255,0.7); }

  .nav-progress {
    margin-left: auto;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    flex-shrink: 0;
  }
  .nav-item.completed .nav-progress { color: var(--teal-light); }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .reset-btn {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
  }
  .reset-btn:hover { color: rgba(255,255,255,0.6); }

  /* ── MAIN ── */
  #main {
    margin-left: 260px;
    min-height: 100vh;
    padding: 48px 56px;
    max-width: 960px;
  }

  /* ── SECTION HEADER ── */
  .section-eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--teal);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--navy);
    line-height: 1.15;
    margin-bottom: 12px;
  }
  .section-desc {
    font-size: 15px;
    color: var(--text-muted);
    max-width: 620px;
    line-height: 1.7;
    margin-bottom: 32px;
  }

  .progress-strip {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    padding: 14px 20px;
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .progress-label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--warm-gray);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-count { font-size: 13px; font-weight: 600; color: var(--navy); white-space: nowrap; }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .card-header {
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: background 0.15s;
  }
  .card-header:hover { background: #FAFAF8; }
  .card.open .card-header { border-bottom-color: var(--border); }

  .card-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .card-title-wrap { flex: 1 }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 2px;
  }
  .card-subtitle { font-size: 12px; color: var(--text-light); }
  .card-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-pending { background: var(--warm-gray); color: var(--text-muted); }
  .badge-progress { background: #FEF3C7; color: #92400E; }
  .badge-done { background: #DCFCE7; color: #166534; }

  .card-chevron {
    color: var(--text-light);
    font-size: 14px;
    transition: transform 0.2s;
  }
  .card.open .card-chevron { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 24px;
  }
  .card.open .card-body { display: block; }

  /* ── CALLOUT ── */
  .callout {
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex;
    gap: 12px;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .callout.info { background: #EFF8FF; border-left: 3px solid #3B82F6; }
  .callout.warn { background: #FFFBEB; border-left: 3px solid var(--amber); }
  .callout.danger { background: #FEF2F2; border-left: 3px solid var(--red); }
  .callout .callout-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .callout-title { font-weight: 600; margin-bottom: 3px; color: var(--navy); font-size: 13px; }

  /* ── CHECKLIST ── */
  .checklist { display: flex; flex-direction: column; gap: 2px; }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    user-select: none;
  }
  .check-item:hover { background: var(--cream); }
  .check-item.checked { opacity: 0.6; }

  .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: var(--white);
  }
  .check-item.checked .checkbox {
    background: var(--teal);
    border-color: var(--teal);
  }
  .checkmark {
    display: none;
    color: white;
    font-size: 12px;
    font-weight: 700;
  }
  .check-item.checked .checkmark { display: block; }

  .check-text { flex: 1; line-height: 1.55; }
  .check-label { font-size: 14px; color: var(--text); }
  .check-item.checked .check-label { text-decoration: line-through; color: var(--text-light); }
  .check-note { font-size: 12px; color: var(--text-light); margin-top: 2px; font-style: italic; }

  /* ── SUBSECTION LABEL ── */
  .sub-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--teal);
    font-weight: 600;
    margin: 20px 0 10px;
    padding-left: 12px;
    border-left: 2px solid var(--teal);
  }

  /* ── TABLE ── */
  .info-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
    margin-top: 12px;
  }
  .info-table th {
    background: var(--navy);
    color: var(--white);
    padding: 10px 14px;
    text-align: left;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.03em;
  }
  .info-table th:first-child { border-radius: 6px 0 0 0; }
  .info-table th:last-child { border-radius: 0 6px 0 0; }
  .info-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: top;
  }
  .info-table tr:last-child td { border-bottom: none; }
  .info-table tr:nth-child(even) td { background: var(--cream); }
  .info-table td:first-child { font-weight: 500; color: var(--navy); }

  /* ── FILL FIELDS ── */
  .fill-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
  }
  .fill-field label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .fill-field input, .fill-field textarea {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: vertical;
  }
  .fill-field input:focus, .fill-field textarea:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(10,123,123,0.08);
    background: var(--white);
  }
  .fill-field textarea { min-height: 70px; line-height: 1.5; }

  .fill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 4px; }

  /* ── AGENDA ── */
  .agenda-list { display: flex; flex-direction: column; gap: 8px; }
  .agenda-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .agenda-item:last-child { border-bottom: none; }
  .agenda-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--navy);
    color: white;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .agenda-text { font-size: 14px; line-height: 1.5; }

  /* ── STATUS BADGE ── */
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .status-pill {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 99px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
  }
  .status-pill.clear { border-color: var(--green); color: var(--green); }
  .status-pill.clear.selected { background: var(--green); color: white; }
  .status-pill.needs { border-color: var(--amber); color: var(--amber); }
  .status-pill.needs.selected { background: var(--amber); color: white; }
  .status-pill.na { border-color: var(--border); color: var(--text-light); }
  .status-pill.na.selected { background: var(--border); color: var(--text-muted); }
  .status-label { font-size: 13px; font-weight: 500; color: var(--navy); margin-right: 4px; }

  /* ── NAV BUTTONS ── */
  .section-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy-mid); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--warm-gray); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── OVERVIEW DASHBOARD ── */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 32px;
  }
  .overview-stat {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 16px;
    box-shadow: var(--shadow);
  }
  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 12px; color: var(--text-light); }

  .section-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .section-row {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow);
  }
  .section-row:hover { border-color: var(--teal); box-shadow: var(--shadow-lg); transform: translateY(-1px); }
  .section-row-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .section-row-title { font-weight: 600; color: var(--navy); font-size: 14px; }
  .section-row-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .section-row-progress {
    margin-left: auto;
    text-align: right;
    flex-shrink: 0;
  }
  .section-row-pct { font-size: 13px; font-weight: 600; color: var(--teal); }
  .section-row-bar {
    width: 80px; height: 4px;
    background: var(--warm-gray);
    border-radius: 99px;
    overflow: hidden;
    margin-top: 4px;
  }
  .section-row-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 99px;
    transition: width 0.4s;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    #sidebar { width: 100%; height: auto; position: relative; }
    #main { margin-left: 0; padding: 24px 20px; }
    .overview-grid { grid-template-columns: 1fr 1fr; }
    .fill-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-logo">
    <div class="brand">Noteable RCM</div>
    <div class="sub">Partner Onboarding Playbook</div>
  </div>

  <div class="partner-info">
    <label>Partner Name</label>
    <input type="text" id="partnerName" placeholder="Enter partner name…" oninput="savePartnerName()">
  </div>

  <nav class="nav-section">
    <div class="nav-label">Sections</div>
    <div class="nav-item active" data-section="overview" onclick="navigate('overview')">
      <div class="nav-icon">⌂</div>
      <div class="nav-text">Overview</div>
    </div>
    <div class="nav-item" data-section="s1" onclick="navigate('s1')">
      <div class="nav-icon">1</div>
      <div class="nav-text">Pre-Launch Site Audit</div>
      <div class="nav-progress" id="nav-prog-s1"></div>
    </div>
    <div class="nav-item" data-section="s2" onclick="navigate('s2')">
      <div class="nav-icon">2</div>
      <div class="nav-text">Week 1 — Preparation</div>
      <div class="nav-progress" id="nav-prog-s2"></div>
    </div>
    <div class="nav-item" data-section="s3" onclick="navigate('s3')">
      <div class="nav-icon">3</div>
      <div class="nav-text">Week 2 — Kickoff</div>
      <div class="nav-progress" id="nav-prog-s3"></div>
    </div>
    <div class="nav-item" data-section="s4" onclick="navigate('s4')">
      <div class="nav-icon">4</div>
      <div class="nav-text">Week 3 — Workflow</div>
      <div class="nav-progress" id="nav-prog-s4"></div>
    </div>
    <div class="nav-item" data-section="s5" onclick="navigate('s5')">
      <div class="nav-icon">5</div>
      <div class="nav-text">Week 4 — Claims</div>
      <div class="nav-progress" id="nav-prog-s5"></div>
    </div>
    <div class="nav-item" data-section="s6" onclick="navigate('s6')">
      <div class="nav-icon">6</div>
      <div class="nav-text">Week 5 — Reconciliation</div>
      <div class="nav-progress" id="nav-prog-s6"></div>
    </div>
    <div class="nav-item" data-section="s7" onclick="navigate('s7')">
      <div class="nav-icon">7</div>
      <div class="nav-text">Week 6 — Final Review</div>
      <div class="nav-progress" id="nav-prog-s7"></div>
    </div>
    <div class="nav-item" data-section="s8" onclick="navigate('s8')">
      <div class="nav-icon">8</div>
      <div class="nav-text">Post-Onboarding</div>
      <div class="nav-progress" id="nav-prog-s8"></div>
    </div>
  </nav>

  <div class="sidebar-footer">
    <button class="reset-btn" onclick="confirmReset()">↺ Reset this partner's progress</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="main">
  <div id="content"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const SECTIONS = {
  s1: {
    eyebrow: "Section 1 — Pre-Launch",
    title: "Site Audit",
    desc: "Complete this audit before the partner's first billing submission. Document all findings and bring the summary to the Week 2 kickoff.",
    icon: "🔍",
    color: "#EFF8FF",
    cards: [
      {
        id: "s1c1", title: "MHS Program Claims Setup", icon: "📋",
        subtitle: "Mental Health Services program billing check",
        callout: { type: "info", icon: "ℹ️", title: "What is MHS?", text: "The MHS program requires a description field on claims submissions. If the partner bills this program and the field is blank, claims will reject at the payer level." },
        checks: [
          { id: "s1_1", label: "Confirm whether partner is currently billing the MHS program" },
          { id: "s1_2", label: "If yes: verify MHS program description field is populated in claims submission settings", note: "Required field — claims without it will reject" },
          { id: "s1_3", label: "If no: document as N/A and revisit in Week 2 if services change" }
        ],
        status: { label: "MHS Setup Status", key: "s1_mhs_status" }
      },
      {
        id: "s1c2", title: "Rates Verification", icon: "💲",
        subtitle: "Fee schedule and payer contract mapping",

// ─── STATE ────────────────────────────────────────────────────────────────────

let state = {};
let currentSection = 'overview';

function getStorageKey() {
  const p = getPartnerName().replace(/[^a-z0-9]/gi, '_').toLowerCase() || 'default';
  return `noteable_rcm_${p}`;
}

function loadState() {
  const raw = localStorage.getItem(getStorageKey());
  state = raw ? JSON.parse(raw) : {};
}

function saveState() {
  localStorage.setItem(getStorageKey(), JSON.stringify(state));
  updateAllProgress();
}

function getPartnerName() {
  return (document.getElementById('partnerName')?.value || '').trim();
}

function savePartnerName() {
  loadState();
  renderSection(currentSection);
  updateAllProgress();
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────

function getSectionChecks(sId) {
  const sec = SECTIONS[sId];
  if (!sec) return { total: 0, done: 0 };
  let total = 0, done = 0;
  sec.cards.forEach(card => {
    (card.checks || []).forEach(c => {
      total++;
      if (state[c.id]) done++;
    });
  });
  return { total, done };
}

function getTotalProgress() {
  let total = 0, done = 0;
  Object.keys(SECTIONS).forEach(sId => {
    const p = getSectionChecks(sId);
    total += p.total;
    done += p.done;
  });
  return { total, done };
}

function updateAllProgress() {
  Object.keys(SECTIONS).forEach(sId => {
    const { total, done } = getSectionChecks(sId);
    const el = document.getElementById(`nav-prog-s${sId.slice(1)}`);
    if (el) el.textContent = total > 0 ? `${done}/${total}` : '';
    const navItem = document.querySelector(`[data-section="${sId}"]`);
    if (navItem) {
      navItem.classList.toggle('completed', total > 0 && done === total);
    }
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function navigate(sectionId) {
  currentSection = sectionId;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === sectionId);
  });
  renderSection(sectionId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderSection(sId) {
  const content = document.getElementById('content');
  if (sId === 'overview') { content.innerHTML = renderOverview(); return; }
  const sec = SECTIONS[sId];
  if (!sec) return;
  const { total, done } = getSectionChecks(sId);
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  const sNum = Object.keys(SECTIONS).indexOf(sId) + 1;
  const prevId = sNum > 1 ? Object.keys(SECTIONS)[sNum - 2] : null;
  const nextId = sNum < Object.keys(SECTIONS).length ? Object.keys(SECTIONS)[sNum] : null;

  content.innerHTML = `
    <div class="section-eyebrow">${sec.eyebrow}</div>
    <h1 class="section-title">${sec.title}</h1>
    <p class="section-desc">${sec.desc}</p>
    <div class="progress-strip">
      <span class="progress-label">Section progress</span>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-count">${done} / ${total} checks</span>
    </div>
    ${sec.cards.map(card => renderCard(card)).join('')}
    <div class="section-nav">
      <button class="btn btn-ghost" onclick="navigate('${prevId || 'overview'}')" ${!prevId ? '' : ''}>← ${prevId ? SECTIONS[prevId].title : 'Overview'}</button>
      <button class="btn btn-primary" onclick="navigate('${nextId || 'overview'}')">${nextId ? SECTIONS[nextId].title + ' →' : '↑ Back to Overview'}</button>
    </div>
  `;
}

function renderCard(card) {
  const checks = card.checks || [];
  const done = checks.filter(c => state[c.id]).length;
  const total = checks.length;
  let badge = '';
  if (total > 0) {
    if (done === 0) badge = `<span class="card-badge badge-pending">${done}/${total}</span>`;
    else if (done < total) badge = `<span class="card-badge badge-progress">${done}/${total}</span>`;
    else badge = `<span class="card-badge badge-done">✓ Complete</span>`;
  }

  let body = '';
  if (card.callout) {
    body += `<div class="callout ${card.callout.type}">
      <div class="callout-icon">${card.callout.icon}</div>
      <div><div class="callout-title">${card.callout.title}</div>${card.callout.text}</div>
    </div>`;
  }
  if (card.agenda) {
    body += `<div class="agenda-list">${card.agenda.map((a, i) => `
      <div class="agenda-item">
        <div class="agenda-num">${i+1}</div>
        <div class="agenda-text">${a}</div>
      </div>`).join('')}</div>`;
  }
  if (checks.length) {
    body += `<div class="checklist">${checks.map(c => `
      <div class="check-item ${state[c.id] ? 'checked' : ''}" onclick="toggleCheck('${c.id}', this)">
        <div class="checkbox"><span class="checkmark">✓</span></div>
        <div class="check-text">
          <div class="check-label">${c.label}</div>
          ${c.note ? `<div class="check-note">${c.note}</div>` : ''}
        </div>
      </div>`).join('')}</div>`;
  }
  if (card.status) {
    const sv = state[card.status.key] || '';
    body += `<div style="margin-top:16px">
      <div class="status-row">
        <span class="status-label">${card.status.label}:</span>
        <span class="status-pill clear ${sv==='clear'?'selected':''}" onclick="setStatus('${card.status.key}','clear',this)">✓ Clear</span>
        <span class="status-pill needs ${sv==='needs'?'selected':''}" onclick="setStatus('${card.status.key}','needs',this)">⚠ Needs Action</span>
        <span class="status-pill na ${sv==='na'?'selected':''}" onclick="setStatus('${card.status.key}','na',this)">N/A</span>
      </div>
    </div>`;
  }
  if (card.fields) {
    body += `<div style="margin-top:16px">
      <div class="fill-grid" style="grid-template-columns: ${card.fields.length === 1 ? '1fr' : '1fr 1fr'}">
        ${card.fields.map(f => `
          <div class="fill-field" style="${f.type==='textarea'?'grid-column:1/-1':''}">
            <label>${f.label}</label>
            ${f.type === 'textarea'
              ? `<textarea placeholder="${f.placeholder}" oninput="saveField('${f.key}',this.value)">${state[f.key]||''}</textarea>`
              : `<input type="text" placeholder="${f.placeholder}" value="${state[f.key]||''}" oninput="saveField('${f.key}',this.value)">`
            }
          </div>`).join('')}
      </div>
    </div>`;
  }

  return `
    <div class="card open" id="${card.id}">
      <div class="card-header" onclick="toggleCard('${card.id}')">
        <div class="card-icon">${card.icon}</div>
        <div class="card-title-wrap">
          <div class="card-title">${card.title}</div>
          <div class="card-subtitle">${card.subtitle}</div>
        </div>
        ${badge}
        <div class="card-chevron">▾</div>
      </div>
      <div class="card-body">${body}</div>
    </div>`;
}

function renderOverview() {
  const { total, done } = getTotalProgress();
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const partner = getPartnerName() || 'New Partner';

  const rows = Object.entries(SECTIONS).map(([sId, sec], i) => {
    const { total: t, done: d } = getSectionChecks(sId);
    const p = t > 0 ? Math.round((d/t)*100) : 0;
    return `
      <div class="section-row" onclick="navigate('${sId}')">
        <div class="section-row-icon" style="background:${sec.color}">${sec.icon}</div>
        <div>
          <div class="section-row-title">${sec.eyebrow.split('—')[0].trim()} — ${sec.title}</div>
          <div class="section-row-sub">${sec.desc.slice(0, 80)}…</div>
        </div>
        <div class="section-row-progress">
          <div class="section-row-pct">${p}%</div>
          <div class="section-row-bar"><div class="section-row-fill" style="width:${p}%"></div></div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="section-eyebrow">Internal Playbook</div>
    <h1 class="section-title">Welcome back${partner !== 'New Partner' ? ', ' + partner.split(' ')[0] : ''}.</h1>
    <p class="section-desc">Track and complete all eight onboarding stages for <strong>${partner}</strong>. Progress saves automatically in your browser.</p>

    <div class="overview-grid">
      <div class="overview-stat">
        <div class="stat-value">${done}</div>
        <div class="stat-label">Checks completed</div>
      </div>
      <div class="overview-stat">
        <div class="stat-value">${total - done}</div>
        <div class="stat-label">Remaining</div>
      </div>
      <div class="overview-stat">
        <div class="stat-value">${pct}%</div>
        <div class="stat-label">Overall progress</div>
      </div>
      <div class="overview-stat">
        <div class="stat-value">${Object.keys(SECTIONS).filter(s => { const p = getSectionChecks(s); return p.total > 0 && p.done === p.total; }).length}</div>
        <div class="stat-label">Sections complete</div>
      </div>
    </div>

    <div class="section-list">${rows}</div>`;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────

function toggleCheck(id, el) {
  state[id] = !state[id];
  el.classList.toggle('checked', state[id]);
  el.querySelector('.checkmark').style.display = state[id] ? 'block' : 'none';
  saveState();
  // Update card badge
  const card = el.closest('.card');
  if (card) updateCardBadge(card);
  // Update progress strip
  const sec = SECTIONS[currentSection];
  if (sec) {
    const { total, done } = getSectionChecks(currentSection);
    const pct = total > 0 ? Math.round((done/total)*100) : 0;
    const fill = document.querySelector('.progress-fill');
    const count = document.querySelector('.progress-count');
    if (fill) fill.style.width = pct + '%';
    if (count) count.textContent = `${done} / ${total} checks`;
  }
}

function updateCardBadge(cardEl) {
  const checks = cardEl.querySelectorAll('.check-item');
  const total = checks.length;
  if (total === 0) return;
  const done = cardEl.querySelectorAll('.check-item.checked').length;
  const badge = cardEl.querySelector('.card-badge');
  if (!badge) return;
  if (done === 0) { badge.className = 'card-badge badge-pending'; badge.textContent = `${done}/${total}`; }
  else if (done < total) { badge.className = 'card-badge badge-progress'; badge.textContent = `${done}/${total}`; }
  else { badge.className = 'card-badge badge-done'; badge.textContent = '✓ Complete'; }
}

function toggleCard(cardId) {
  const card = document.getElementById(cardId);
  if (card) card.classList.toggle('open');
}

function setStatus(key, val, el) {
  state[key] = val;
  saveState();
  const row = el.closest('.status-row');
  row.querySelectorAll('.status-pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
}

function saveField(key, val) {
  state[key] = val;
  saveState();
}

function confirmReset() {
  if (confirm(`Reset all progress for "${getPartnerName() || 'this partner'}"? This cannot be undone.`)) {
    const key = getStorageKey();
    localStorage.removeItem(key);
    state = {};
    renderSection(currentSection);
    updateAllProgress();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

loadState();
renderSection('overview');
updateAllProgress();

// Restore partner name if saved
const savedName = state['__partnerName'];
if (savedName) document.getElementById('partnerName').value = savedName;

document.getElementById('partnerName').addEventListener('input', function() {
  state['__partnerName'] = this.value;
  saveState();
});
</script>
</body>
</html>
