<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Templates Library</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #185FA5;
      --accent-light: rgba(24,95,165,0.10);
      --bg: #f5f4f1;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --text: #1a1a18;
      --text-muted: #6b6a65;
      --text-faint: #9e9d97;
      --radius: 10px;
      --radius-sm: 6px;
    }
    html, body { min-height:100%; background:var(--bg); font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; color:var(--text); font-size:14px; line-height:1.5; }
    .shell { display:grid; grid-template-rows:auto auto 1fr; min-height:100vh; }

    /* Topbar */
    .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:200; }
    .brand { display:flex; align-items:center; gap:12px; }
    .brand-mark { width:32px; height:32px; background:var(--accent); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
    .brand-mark svg { width:16px; height:16px; }
    .brand-name { font-size:15px; font-weight:600; letter-spacing:-0.3px; color:var(--text); }
    .brand-name span { color:var(--accent); }
    .brand-sub { font-size:11px; color:var(--text-muted); margin-top:1px; }
    .topbar-right { display:flex; align-items:center; gap:10px; }

    .search-wrap { position:relative; }
    .search-wrap input { font-family:inherit; font-size:13px; padding:8px 14px 8px 36px; width:280px; border:1px solid var(--border-strong); border-radius:20px; background:var(--surface2); color:var(--text); outline:none; transition:border-color 0.15s,box-shadow 0.15s,width 0.2s; }
    .search-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); width:340px; background:var(--surface); }
    .search-wrap input::placeholder { color:var(--text-faint); }
    .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--text-muted); pointer-events:none; }

    .theme-btn { font-family:inherit; font-size:12px; padding:7px 14px; border:1px solid var(--border-strong); border-radius:20px; background:var(--surface); color:var(--text-muted); cursor:pointer; display:flex; align-items:center; gap:7px; transition:background 0.15s; white-space:nowrap; }
    .theme-btn:hover { background:var(--surface2); }
    .theme-dot { width:11px; height:11px; border-radius:50%; background:var(--accent); flex-shrink:0; transition:background 0.2s; }

    /* Tab bar */
    .tab-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 32px; display:flex; align-items:flex-end; position:sticky; top:60px; z-index:190; }
    .tab-btn { font-family:inherit; font-size:13px; font-weight:500; padding:13px 20px 12px; border:none; border-bottom:2px solid transparent; background:none; color:var(--text-muted); cursor:pointer; transition:color 0.15s,border-color 0.15s; white-space:nowrap; margin-bottom:-1px; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

    /* Color panel */
    .color-panel { position:fixed; top:130px; right:32px; background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--radius); padding:16px; z-index:300; width:216px; box-shadow:0 8px 32px rgba(0,0,0,0.12); display:none; }
    .color-panel.open { display:block; }
    .color-panel-title { font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:12px; }
    .color-swatches { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
    .swatch { width:32px; height:32px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.12s,border-color 0.12s; position:relative; }
    .swatch:hover { transform:scale(1.12); }
    .swatch.selected { border-color:var(--text); }
    .swatch.selected::after { content:''; position:absolute; inset:0; border-radius:50%; box-shadow:inset 0 0 0 2px white; }

    /* Main */
    .main { padding:28px 32px 48px; max-width:1280px; margin:0 auto; width:100%; }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }

    .stats-row { display:flex; align-items:center; margin-bottom:20px; }
    .stat-pill { font-size:12px; color:var(--text-muted); background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:5px 12px; }
    .stat-pill strong { color:var(--text); font-weight:600; }

    .filter-row { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:22px; }
    .chip { font-family:inherit; font-size:12px; padding:5px 13px; border-radius:20px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .chip:hover { background:var(--surface2); color:var(--text); }
    .chip.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500; }

    /* Grid & Cards */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:14px; align-items:start; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:border-color 0.15s,box-shadow 0.15s; cursor:pointer; }
    .card:hover { border-color:var(--accent); box-shadow:0 2px 12px rgba(0,0,0,0.07); }
    .card.expanded { grid-column:1/-1; cursor:default; }
    .card.expanded .card-header { cursor:pointer; }

    .card-header { padding:16px 18px 14px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .card-header-left { flex:1; min-width:0; }
    .card-cat { display:inline-block; font-size:10px; font-weight:600; letter-spacing:0.7px; text-transform:uppercase; padding:3px 9px; border-radius:4px; background:var(--accent-light); color:var(--accent); margin-bottom:7px; }
    .card-title { font-size:14px; font-weight:600; color:var(--text); line-height:1.4; margin-bottom:8px; }

    /* Denial codes row on card (collapsed) */
    .card-codes { display:flex; flex-wrap:wrap; gap:5px; }
    .code-badge { font-size:10px; font-weight:600; font-family:'Helvetica Neue',Helvetica,monospace; padding:2px 7px; border-radius:4px; border:1px solid; letter-spacing:0.3px; }
    .code-badge.carc { background:#eef4ff; color:#1a4a8a; border-color:#b8d0f5; }
    .code-badge.rarc { background:#f0faf5; color:#1a5c3a; border-color:#a8d9be; }
    .code-badge.payer { background:#f3eeff; color:#4a2d8a; border-color:#c9b0f0; }
    .code-badge.payer::before { content:'★ '; font-size:8px; opacity:0.7; }

    .toggle-icon { width:26px; height:26px; border-radius:50%; border:1px solid var(--border-strong); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s; background:var(--surface2); }
    .toggle-icon svg { width:12px; height:12px; color:var(--text-muted); transition:transform 0.2s; }
    .card.expanded .toggle-icon { background:var(--accent); border-color:var(--accent); }
    .card.expanded .toggle-icon svg { color:white; transform:rotate(45deg); }

    /* Expanded */
    .card-body { border-top:1px solid var(--border); padding:18px 18px 20px; }
    .expanded-inner { display:grid; grid-template-columns:1fr 300px; gap:24px; align-items:start; }
    @media(max-width:800px) { .expanded-inner { grid-template-columns:1fr; } }

    .template-label { font-size:10px; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-faint); margin-bottom:10px; font-weight:600; }
    .template-text { font-size:13px; line-height:1.75; color:var(--text); white-space:pre-wrap; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; }

    .sidebar-section { margin-bottom:18px; }
    .sidebar-label { font-size:10px; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-faint); margin-bottom:8px; font-weight:600; }

    /* Denial codes in sidebar (expanded) */
    .code-list { display:flex; flex-direction:column; gap:6px; }
    .code-row { display:flex; align-items:flex-start; gap:8px; }
    .code-row .code-badge { flex-shrink:0; margin-top:1px; }
    .code-desc { font-size:12px; color:var(--text-muted); line-height:1.4; }

    .placeholders { display:flex; flex-wrap:wrap; gap:6px; }
    .ph-tag { font-size:11px; padding:3px 9px; border-radius:4px; background:#fff8e6; color:#7a5200; border:1px solid #e8d49a; font-family:'Helvetica Neue',Helvetica,monospace; }

    .copy-btn { width:100%; font-family:inherit; font-size:13px; font-weight:500; padding:10px 16px; border-radius:var(--radius-sm); border:none; background:var(--accent); color:white; cursor:pointer; transition:opacity 0.15s,background 0.15s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .copy-btn:hover { opacity:0.88; }
    .copy-btn.copied { background:#2d8a4e; }
    .copy-btn svg { width:14px; height:14px; }

    .keywords-list { display:flex; flex-wrap:wrap; gap:5px; }
    .kw-tag { font-size:11px; padding:2px 8px; background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); border-radius:4px; }

    .empty { grid-column:1/-1; text-align:center; padding:60px 24px; color:var(--text-muted); }
    .empty-icon { font-size:36px; margin-bottom:12px; }
    .empty h3 { font-size:16px; font-weight:500; color:var(--text); margin-bottom:6px; }
    .empty p { font-size:13px; }
  </style>
</head>
<body>
<div class="shell">

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" id="brandMark">
        <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h10"/></svg>
      </div>
      <div>
        <div class="brand-name">Appeal <span id="brandSpan">Templates</span></div>
        <div class="brand-sub">Denial Response Library</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
        <input type="text" id="search" placeholder="Search by keyword, code, or topic…" oninput="render()">
      </div>
      <button class="theme-btn" onclick="togglePanel()" id="themeBtn">
        <span class="theme-dot" id="dot"></span>Color theme
      </button>
    </div>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" id="tab-denial" onclick="switchTab('denial')">Denial Response Library</button>
    <button class="tab-btn" id="tab-tasked" onclick="switchTab('tasked')">Commonly Tasked</button>
  </nav>

  <div class="color-panel" id="colorPanel">
    <div class="color-panel-title">Accent color</div>
    <div class="color-swatches" id="swatches"></div>
  </div>

  <main class="main">
    <div class="tab-pane active" id="pane-denial">
      <div class="stats-row"><div class="stat-pill" id="countPill-denial"><strong>—</strong> templates</div></div>
      <div class="filter-row" id="filters-denial"></div>
      <div class="grid" id="grid-denial"></div>
    </div>
    <div class="tab-pane" id="pane-tasked">
      <div class="stats-row"><div class="stat-pill" id="countPill-tasked"><strong>—</strong> templates</div></div>
      <div class="filter-row" id="filters-tasked"></div>
      <div class="grid" id="grid-tasked"></div>
    </div>
  </main>
</div>

<script>
const COLORS=[{name:'Blue',hex:'#185FA5'},{name:'Navy',hex:'#042C53'},{name:'Teal',hex:'#0F6E56'},{name:'Green',hex:'#3B6D11'},{name:'Purple',hex:'#534AB7'},{name:'Coral',hex:'#993C1D'},{name:'Pink',hex:'#993556'},{name:'Amber',hex:'#854F0B'},{name:'Red',hex:'#A32D2D'},{name:'Gray',hex:'#444441'}];

// codes: array of {code, type:'carc'|'rarc'|'payer', desc}
const DENIAL_TEMPLATES=[
  {
    id:'d1',category:'Rate / Locality Error',
    title:'Urban vs. rural rate underpayment',
    keywords:['rate','urban','rural','locality','underpaid','fee schedule','H0046','DMAS','CMS'],
    codes:[
      {code:'CO-45',type:'carc',desc:'Charge exceeds fee schedule / max allowable — used here in reverse when payer applied wrong (lower) schedule'},
      {code:'N14',type:'rarc',desc:'Payment based on a contractual amount, fee schedule, or maximum allowable'},
      {code:'N669',type:'rarc',desc:'Adjusted based on the fee schedule (locality-specific)'},
    ],
    template:`Our records indicate this claim was underpaid because it was reimbursed at the rural rate instead of the urban rate mandated by the Virginia Medicaid fee schedule.

DMAS follows CMS guidance in establishing different rates for services provided in urban and rural areas. This provider's office is located in [CITY], designated as an urban area under Virginia Medicaid guidelines.

For the date of service in question, the correct rate for [PROC CODE] in an urban locality is [URBAN RATE] per unit, not the rural rate of [RURAL RATE]. This discrepancy has resulted in an underpayment of [AMOUNT].

We request that this claim be reprocessed and reimbursed at the urban rate as required. Please note that this has impacted all claims for this member, and all will need to be reprocessed accordingly.`,
    placeholders:['[CITY]','[PROC CODE]','[URBAN RATE]','[RURAL RATE]','[AMOUNT]']
  },
  {
    id:'d2',category:'Authorization on File',
    title:'Standard auth denial — auth exists',
    keywords:['197','no authorization','auth on file','authorization','denied','remark code'],
    codes:[
      {code:'CO-197',type:'carc',desc:'Precertification/authorization/notification absent'},
      {code:'N210',type:'rarc',desc:'Alert: You may appeal this decision'},
      {code:'MA120',type:'rarc',desc:'No authorization on file'},
    ],
    template:`This claim was denied due to remark code 197 — no authorization on file. The member has an authorization on file for this service and date span.

Auth ID: [AUTH ID] // [AUTH DATE SPAN]

Please reprocess this claim for payment accordingly.`,
    placeholders:['[AUTH ID]','[AUTH DATE SPAN]']
  },
  {
    id:'d3',category:'Authorization on File',
    title:'Auth denial with proof of authorization attached',
    keywords:['197','no authorization','proof','attached','ICR','approval','documentation'],
    codes:[
      {code:'CO-197',type:'carc',desc:'Precertification/authorization/notification absent'},
      {code:'MA120',type:'rarc',desc:'No authorization on file'},
      {code:'N210',type:'rarc',desc:'Alert: You may appeal this decision'},
    ],
    template:`This claim was denied due to remark code 197 — no authorization on file. The member has an authorization on file for this service and date span.

Auth ID: [AUTH ID] // [AUTH DATE SPAN]

Proof of authorization is attached for reference. Please reprocess for payment accordingly.`,
    placeholders:['[AUTH ID]','[AUTH DATE SPAN]']
  },
  {
    id:'d4',category:'Authorization on File',
    title:'Auth denial with correctly paid claim cited as precedent',
    keywords:['197','authorization','correctly paid','example','claim ID','precedent','adjudicated'],
    codes:[
      {code:'CO-197',type:'carc',desc:'Precertification/authorization/notification absent'},
      {code:'CO-15',type:'carc',desc:'Authorization number missing, invalid, or does not apply to billed services'},
      {code:'N56',type:'rarc',desc:'Incomplete/invalid treatment authorization code'},
    ],
    template:`This claim was denied due to remark code 197 — no authorization on file. The member has an authorization on file for this service and date.

Auth ID: [AUTH ID] // [AUTH DATE SPAN]

Please see claim ID [PAID CLAIM ID] as an example of a correctly adjudicated claim under this authorization. Please reprocess for payment accordingly.`,
    placeholders:['[AUTH ID]','[AUTH DATE SPAN]','[PAID CLAIM ID]']
  },
  {
    id:'d5',category:'Units Exceed Authorization',
    title:'Remark 198 — units available, not fully utilized',
    keywords:['198','units','exceed','authorized units','not utilized','approved units','billed units'],
    codes:[
      {code:'CO-198',type:'carc',desc:'Precertification/authorization exceeded — units billed exceed approved quantity'},
      {code:'N362',type:'rarc',desc:'Number of days or units of service exceeds acceptable maximum'},
      {code:'N435',type:'rarc',desc:'Exceeds number/frequency approved within time period without supporting documentation'},
    ],
    template:`This claim was denied due to remark code 198 — units billed exceed units authorized. The member has an authorization on file for this service and date span.

Auth ID: [AUTH ID] // [AUTH DATE SPAN]

This authorization was approved for [APPROVED UNITS] units, which have not been utilized in full. Proof of authorization is attached. Please reprocess for payment accordingly.`,
    placeholders:['[AUTH ID]','[AUTH DATE SPAN]','[APPROVED UNITS]']
  },
  {
    id:'d6',category:'Authorization Not Required',
    title:'In-network provider — prior auth not required',
    keywords:['197','in network','outpatient','psychotherapy','prior authorization','not required','Y3Z','exempt'],
    codes:[
      {code:'CO-197',type:'carc',desc:'Precertification/authorization absent — disputed: in-network providers exempt'},
      {code:'CO-96',type:'carc',desc:'Non-covered charge — may appear if payer flags as non-covered pending auth'},
      {code:'N210',type:'rarc',desc:'Alert: You may appeal this decision'},
    ],
    template:`This claim was denied due to remark code [REMARK CODE] — no authorization on file. [SERVICE TYPE] services do not require prior authorization when the practitioner is in network with this plan.

This provider has been in network effective [EFFECTIVE DATE]. Please reprocess this claim for payment, and audit all other claims affiliated with this provider that denied for a similar reason from [EFFECTIVE DATE] forward, accordingly.`,
    placeholders:['[REMARK CODE]','[SERVICE TYPE]','[EFFECTIVE DATE]']
  },
  {
    id:'d7',category:'Primary Payer / COB',
    title:'Primary payer auth denial — out-of-network, not applicable',
    keywords:['primary payer','EOB','out of network','coordination of benefits','COB','non-participating','commercial','secondary'],
    codes:[
      {code:'CO-197',type:'carc',desc:'Primary payer auth denial — not applicable to non-participating providers'},
      {code:'OA-23',type:'carc',desc:'Impact of prior payer adjudication including payments and/or adjustments (COB)'},
      {code:'N30',type:'rarc',desc:'Patient ineligible for this service — context: auth requirement does not apply OON'},
    ],
    template:`Clarification regarding primary payer denial:

The attached primary payer EOB reflects a denial reason of "no authorization on file." This denial reason is not applicable to this claim for the following reasons:

  • The rendering provider is out of network with the primary commercial insurer.
  • The provider is not contractually required to obtain prior authorization from the primary insurer.
  • The denial reflects an administrative requirement that does not apply to non-participating providers — not a coverage exclusion.

The primary payer has adjudicated the claim to the extent required under coordination of benefits rules. The attached EOB satisfies Medicaid's requirement for documentation of primary insurance disposition. Please reprocess accordingly.`,
    placeholders:[]
  },
  {
    id:'d8',category:'Service Facility Address',
    title:'N294 denial — address submitted, denial persists',
    keywords:['N294','service facility','address','missing','incomplete','invalid','resubmitted','billing edit'],
    codes:[
      {code:'CO-16',type:'carc',desc:'Claim/service lacks information or has submission/billing errors'},
      {code:'N294',type:'rarc',desc:'Missing/incomplete/invalid service facility primary address'},
    ],
    template:`This claim was denied due to remark code N294 — missing/incomplete/invalid service facility primary address. The claim has been resubmitted with the service facility address included; however, the denial has persisted.

This appears to be a recently implemented billing edit. Claims for this procedure code processed as recently as [PRIOR DATE] adjudicated without this denial and without a service facility address requirement.

We request review of this edit and reprocessing of the claim(s) accordingly. Please advise if additional documentation is needed.`,
    placeholders:['[PRIOR DATE]']
  },
  {
    id:'d9',category:'Provider Licensing',
    title:'Reprocess all claims per provider licensure effective date',
    keywords:['licensing','provider','license','effective date','reprocess','all claims','proof of license','credentialing'],
    codes:[
      {code:'CO-170',type:'carc',desc:'Payment denied — service performed/billed by this type of provider (credentialing/enrollment issue)'},
      {code:'N95',type:'rarc',desc:'This provider type/specialty may not bill this service'},
      {code:'M143',type:'rarc',desc:'Provider needs to update their license information with the payer'},
      {code:'N767',type:'rarc',desc:'Claim will not be processed until provider enrolls in the Medicaid program'},
      {code:'N189',type:'payer',desc:'Sentara-specific: one-time exception payment indicator — used by Sentara when processing claims pending provider licensure confirmation'},
    ],
    template:`Please see the attached proof of licensing for this provider, effective [LICENSE DATE].

We request that all claims on file for this provider be reviewed and reprocessed in light of the confirmed licensure. Please process all applicable claims accordingly.`,
    placeholders:['[LICENSE DATE]']
  },
];

const TASKED_TEMPLATES=[
  {
    id:'t1',category:'Units Reconciliation',
    title:'Units exceed authorized — full breakdown reconciliation',
    keywords:['units','exceed','authorized','pre-screening','DOS','paid','approved','32 units','reconciliation','breakdown'],
    codes:[
      {code:'CO-198',type:'carc',desc:'Precertification/authorization exceeded — units billed exceed approved quantity'},
      {code:'N362',type:'rarc',desc:'Number of days or units of service exceeds acceptable maximum'},
    ],
    template:`Units billed exceed units authorized. Please see the unit reconciliation below:

  • [UNIT TYPE 1]: [UNITS 1] units
  • [UNIT TYPE 2]: [UNITS 2] units
  • [UNIT TYPE 3 (if applicable)]: [UNITS 3] units

Total approved: [TOTAL APPROVED] units
Total paid to date: [TOTAL PAID] units

Authorization has been fulfilled in full. Please reprocess this claim accordingly.`,
    placeholders:['[UNIT TYPE 1]','[UNITS 1]','[UNIT TYPE 2]','[UNITS 2]','[UNIT TYPE 3]','[UNITS 3]','[TOTAL APPROVED]','[TOTAL PAID]']
  },
  {
    id:'t2',category:'Units Reconciliation',
    title:'Units exceed authorized — pre-screening + DOS fully utilized',
    keywords:['units','pre-screening','DOS','approved','paid','utilized','overage'],
    codes:[
      {code:'CO-198',type:'carc',desc:'Precertification/authorization exceeded — units billed exceed approved quantity'},
      {code:'N435',type:'rarc',desc:'Exceeds number/frequency approved within time period without supporting documentation'},
    ],
    template:`Units billed exceed units authorized. Paid [PRE-SCREEN UNITS] units pre-screening + [DOS UNITS] units on [DOS DATE]. [TOTAL APPROVED] units approved, [TOTAL APPROVED] units paid.`,
    placeholders:['[PRE-SCREEN UNITS]','[DOS UNITS]','[DOS DATE]','[TOTAL APPROVED]']
  },
  {
    id:'t3',category:'Units Reconciliation',
    title:'Units exceed authorized — treatment DOS only, fully utilized',
    keywords:['units','treatment','DOS','approved','paid','utilized'],
    codes:[
      {code:'CO-198',type:'carc',desc:'Precertification/authorization exceeded — units billed exceed approved quantity'},
      {code:'N362',type:'rarc',desc:'Number of days or units of service exceeds acceptable maximum'},
    ],
    template:`Units billed exceed units authorized. Paid [DOS 1 UNITS] units treatment on [DOS 1 DATE] + [DOS 2 UNITS] units treatment on [DOS 2 DATE]. [TOTAL APPROVED] units approved, [TOTAL APPROVED] units paid.`,
    placeholders:['[DOS 1 UNITS]','[DOS 1 DATE]','[DOS 2 UNITS]','[DOS 2 DATE]','[TOTAL APPROVED]']
  },
  {
    id:'t4',category:'Units Reconciliation',
    title:'Units exceed authorized — 1-unit overage on funding card',
    keywords:['units','overage','funding card','approval span','1 unit'],
    codes:[
      {code:'CO-198',type:'carc',desc:'Precertification/authorization exceeded — units billed exceed approved quantity'},
      {code:'N362',type:'rarc',desc:'Number of days or units of service exceeds acceptable maximum'},
    ],

let activeTab='denial';
let activeFilter={denial:'All',tasked:'All'};
let expandedId={denial:null,tasked:null};
let selectedColor=COLORS[0].hex;

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  document.getElementById('search').value='';
  render();
}

function setAccent(hex){
  selectedColor=hex;
  document.documentElement.style.setProperty('--accent',hex);
  document.documentElement.style.setProperty('--accent-light',hex+'1a');
  document.getElementById('dot').style.background=hex;
  document.getElementById('brandMark').style.background=hex;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('selected',s.dataset.hex===hex));
}

function buildSwatches(){
  document.getElementById('swatches').innerHTML=COLORS.map(c=>
    `<div class="swatch${c.hex===selectedColor?' selected':''}" style="background:${c.hex}" data-hex="${c.hex}" title="${c.name}" onclick="setAccent('${c.hex}')"></div>`
  ).join('');
}

function togglePanel(){document.getElementById('colorPanel').classList.toggle('open');}
document.addEventListener('click',e=>{
  const panel=document.getElementById('colorPanel'),btn=document.getElementById('themeBtn');
  if(!panel.contains(e.target)&&!btn.contains(e.target))panel.classList.remove('open');
});

function buildFilters(tab){
  const templates=tab==='denial'?DENIAL_TEMPLATES:TASKED_TEMPLATES;
  const cats=['All',...new Set(templates.map(t=>t.category))];
  document.getElementById('filters-'+tab).innerHTML=cats.map(c=>
    `<button class="chip${activeFilter[tab]===c?' active':''}" onclick="setFilter('${tab}','${c.replace(/'/g,"\\'")}')"> ${c}</button>`
  ).join('');
}

function setFilter(tab,f){activeFilter[tab]=f;expandedId[tab]=null;buildFilters(tab);renderTab(tab);}

function filtered(tab){
  const templates=tab==='denial'?DENIAL_TEMPLATES:TASKED_TEMPLATES;
  const q=document.getElementById('search').value.toLowerCase().trim();
  return templates.filter(t=>{
    const matchCat=activeFilter[tab]==='All'||t.category===activeFilter[tab];
    const matchQ=!q||t.title.toLowerCase().includes(q)||t.category.toLowerCase().includes(q)||
      t.keywords.some(k=>k.toLowerCase().includes(q))||t.template.toLowerCase().includes(q)||
      t.codes.some(c=>c.code.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q));
    return matchCat&&matchQ;
  });
}

function copyText(id){
  const all=[...DENIAL_TEMPLATES,...TASKED_TEMPLATES];
  const t=all.find(t=>t.id===id);
  if(!t)return;
  navigator.clipboard.writeText(t.template).then(()=>{
    const btn=document.getElementById('copy-'+id);
    btn.innerHTML=`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2 8 6 12 14 4"/></svg> Copied!`;
    btn.classList.add('copied');
    setTimeout(()=>{btn.innerHTML=copyIconHTML();btn.classList.remove('copied');},2000);
  });
}

function copyIconHTML(){return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="9" height="11" rx="1.5"/><path d="M3 5H2a1 1 0 00-1 1v8a1 1 0 001 1h8a1 1 0 001-1v-1"/></svg> Copy template`;}
function plusIconHTML(){return `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>`;}

function codesHTML(codes,expanded){
  if(!codes||!codes.length)return'';
  if(!expanded){
    return`<div class="card-codes">${codes.map(c=>`<span class="code-badge ${c.type}">${c.code}</span>`).join('')}</div>`;
  }
  return`<div class="code-list">${codes.map(c=>`
    <div class="code-row">
      <span class="code-badge ${c.type}">${c.code}</span>
      <span class="code-desc">${c.desc}</span>
    </div>`).join('')}</div>`;
}

function toggleExpand(tab,id){
  expandedId[tab]=expandedId[tab]===id?null:id;
  renderTab(tab);
  if(expandedId[tab]){
    setTimeout(()=>{
      const el=document.querySelector('#pane-'+tab+' .card.expanded');
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    },50);
  }
}

function renderTab(tab){
  const items=filtered(tab);
  document.getElementById('countPill-'+tab).innerHTML=`<strong>${items.length}</strong> template${items.length!==1?'s':''}`;
  buildFilters(tab);
  if(!items.length){
    document.getElementById('grid-'+tab).innerHTML=`<div class="empty"><div class="empty-icon">&#128269;</div><h3>No templates found</h3><p>Try a different search term or clear the category filter.</p></div>`;
    return;
  }
  document.getElementById('grid-'+tab).innerHTML=items.map(t=>{
    const exp=expandedId[tab]===t.id;
    return`<div class="card${exp?' expanded':''}" id="card-${t.id}">
      <div class="card-header" onclick="toggleExpand('${tab}','${t.id}')">
        <div class="card-header-left">
          <div class="card-cat">${t.category}</div>
          <div class="card-title">${t.title}</div>
          ${codesHTML(t.codes,false)}
        </div>
        <div class="toggle-icon">${plusIconHTML()}</div>
      </div>
      ${exp?`<div class="card-body">
        <div class="expanded-inner">
          <div>
            <div class="template-label">Template text</div>
            <div class="template-text">${t.template}</div>
          </div>
          <div>
            ${t.codes&&t.codes.length?`<div class="sidebar-section">
              <div class="sidebar-label">Associated denial codes</div>
              ${codesHTML(t.codes,true)}
              ${t.codes.some(c=>c.type==='payer')?'<div style="margin-top:8px;font-size:11px;color:var(--text-faint);">&#9733; Payer-specific code (Sentara)</div>':''}
            </div>`:''}
            ${t.placeholders.length?`<div class="sidebar-section">
              <div class="sidebar-label">Placeholders to fill in</div>
              <div class="placeholders">${t.placeholders.map(p=>`<span class="ph-tag">${p}</span>`).join('')}</div>
            </div>`:''}
            <div class="sidebar-section">
              <div class="sidebar-label">Related keywords</div>
              <div class="keywords-list">${t.keywords.map(k=>`<span class="kw-tag">${k}</span>`).join('')}</div>
            </div>
            <button class="copy-btn" id="copy-${t.id}" onclick="copyText('${t.id}')">${copyIconHTML()}</button>
          </div>
        </div>
      </div>`:''}
    </div>`;
  }).join('');
}

function render(){renderTab('denial');renderTab('tasked');}
buildSwatches();setAccent(selectedColor);render();
</script>
